name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [aarch64-softmmu, x86_64-softmmu]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build python3 python3-pip libglib2.0-dev libpixman-1-dev pkg-config flex bison
    
    - name: Configure
      run: |
        ./configure --target-list=${{ matrix.target }} --disable-docs --disable-werror
        
    - name: Build
      run: |
        make -j$(nproc)
        
    - name: Test
      run: |
        make check-unit || true
