name: Static Checks

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  check-patch:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y perl git
    
    - name: Run checkpatch on latest commit
      run: |
        ./scripts/checkpatch.pl HEAD~1..HEAD || true
