name: Windows Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  msys2-64bit:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          bison diffutils flex git grep make sed
          mingw-w64-x86_64-binutils mingw-w64-x86_64-ccache
          mingw-w64-x86_64-curl-winssl mingw-w64-x86_64-gcc
          mingw-w64-x86_64-glib2 mingw-w64-x86_64-libnfs
          mingw-w64-x86_64-libssh mingw-w64-x86_64-ninja
          mingw-w64-x86_64-pixman mingw-w64-x86_64-pkgconf
          mingw-w64-x86_64-python mingw-w64-x86_64-python-certifi
          mingw-w64-x86_64-python-setuptools mingw-w64-x86_64-python-wheel
          mingw-w64-x86_64-zstd
    
    - name: Configure
      shell: msys2 {0}
      run: |
        mkdir build
        cd build
        ../configure --disable-system --enable-tools -Ddebug=false -Doptimization=0
        
    - name: Build
      shell: msys2 {0}
      run: |
        cd build
        make -j$(nproc)
        
    - name: Test
      shell: msys2 {0}
      run: |
        cd build
        make check || true

  msys2-arm64:
    runs-on: windows-11-arm
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: CLANGARM64
        update: true
        install: >-
          bison diffutils flex git grep make sed
          mingw-w64-clang-aarch64-binutils mingw-w64-clang-aarch64-ccache
          mingw-w64-clang-aarch64-curl-winssl mingw-w64-clang-aarch64-gcc
          mingw-w64-clang-aarch64-glib2 mingw-w64-clang-aarch64-libnfs
          mingw-w64-clang-aarch64-libssh mingw-w64-clang-aarch64-ninja
          mingw-w64-clang-aarch64-pixman mingw-w64-clang-aarch64-pkgconf
          mingw-w64-clang-aarch64-python mingw-w64-clang-aarch64-python-certifi
          mingw-w64-clang-aarch64-python-setuptools mingw-w64-clang-aarch64-python-wheel
          mingw-w64-clang-aarch64-zstd
    
    - name: Configure
      shell: msys2 {0}
      run: |
        mkdir build
        cd build
        ../configure --disable-system --enable-tools -Ddebug=false -Doptimization=0
        
    - name: Build
      shell: msys2 {0}
      run: |
        cd build
        make -j$(nproc)
        
    - name: Test
      shell: msys2 {0}
      run: |
        cd build
        make check || true
